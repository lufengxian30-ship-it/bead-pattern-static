<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>拼豆图纸生成器</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">BEAD PATTERN STUDIO</p>
        <h1>把图片变成拼豆图纸</h1>
        <p class="lead">
          上传图片后，选择规格和颜色档位，自动生成可打印的拼豆图纸、色号统计图和配色表。
        </p>
      </header>

      <section class="controls card">
        <label class="upload" id="dropzone">
          <input id="imageInput" type="file" accept="image/*" />
          <span>点击或拖拽上传图片</span>
          <small>支持 JPG / PNG / WEBP</small>
        </label>

        <div class="grid">
          <div>
            <h2>规格</h2>
            <div class="segmented" id="sizeSelect">
              <button class="active" data-size="104">104×104</button>
              <button data-size="78">78×78</button>
              <button data-size="52">52×52</button>
            </div>
          </div>

          <div>
            <h2>颜色数量</h2>
            <div class="segmented colors" id="colorCount">
              <button data-colors="8">8 色</button>
              <button class="active" data-colors="12">12 色</button>
              <button data-colors="16">16 色</button>
              <button data-colors="24">24 色</button>
              <button data-colors="32">32 色</button>
              <button data-colors="48">48 色</button>
            </div>
          </div>
        </div>

        <label class="toggle">
          <input id="preserveAspect" type="checkbox" checked />
          <span>保持比例后居中裁切</span>
        </label>

        <div class="actions">
          <button id="generateBtn" class="primary">生成图纸</button>
          <button id="downloadPatternBtn" disabled>下载效果图 PNG</button>
          <button id="downloadLegendBtn" disabled>下载统计图 PNG</button>
          <button id="downloadCsvBtn" disabled>下载配色表 CSV</button>
        </div>
      </section>

      <section class="preview card">
        <div class="preview-head">
          <div>
            <h2>预览区</h2>
            <p id="statusText">上传一张图片开始生成。</p>
          </div>
          <div class="meta">
            <span>规格</span><strong id="gridSizeText">104×104</strong>
            <span>颜色库</span><strong>Mard-221</strong>
          </div>
        </div>

        <div class="canvas-grid">
          <div class="canvas-card">
            <h3>效果图</h3>
            <canvas id="patternCanvas" width="1040" height="1040"></canvas>
          </div>
          <div class="canvas-card">
            <h3>统计图</h3>
            <canvas id="legendCanvas" width="1400" height="1800"></canvas>
          </div>
        </div>

        <div class="info-grid">
          <article class="card soft">
            <h3>色号说明</h3>
            <p>图纸中的每个色块都显示两位编号，方便查找。</p>
          </article>
          <article class="card soft">
            <h3>下载说明</h3>
            <p>效果图和统计图会分开导出，适合打印和备豆。</p>
          </article>
        </div>

        <div id="paletteList" class="palette-list"></div>
      </section>
    </main>

    <template id="paletteItemTemplate">
      <div class="palette-item">
        <span class="swatch"></span>
        <div>
          <strong class="palette-hex"></strong>
          <div class="palette-count"></div>
        </div>
      </div>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
